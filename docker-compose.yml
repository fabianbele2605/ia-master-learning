version: '3.8'

services:
  # ============ POSTGRESQL ============
  db:
    image: postgres:15-alpine
    container_name: ml_api_db
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpass123
      POSTGRES_DB: ml_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d ml_app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_network

  # ============ REDIS (Cache) ============
  redis:
    image: redis:7-alpine
    container_name: ml_api_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_network

  # ============ FASTAPI ============
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_api_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mluser:mlpass123@db:5432/ml_app_db
      REDIS_URL: redis://redis:6379/0
      ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./projects:/app/projects
      - ./models:/app/models
    command: uvicorn projects.mes3.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ml_network

volumes:
  postgres_data:
    driver: local

networks:
  ml_network:
    driver: bridge
