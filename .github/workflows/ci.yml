name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8 (opcional)
      run: |
        pip install flake8
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql://postgres:test@localhost:5432/test_db
      run: |
        pytest projects/mes3/ -v --tb=short
      continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t ml-api:${{ github.sha }} .
        docker build -t ml-api:latest .

    - name: Login to Docker Hub (si quieres push)
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != ''
      continue-on-error: true

    - name: Push to Docker Hub
      run: |
        docker push ml-api:${{ github.sha }}
        docker push ml-api:latest
      if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != ''
      continue-on-error: true
